<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Movie Recommendation</h1>
    <select id="genreFilter">
        <option value="all">All</option>
        <option value="action">Action</option>
        <option value="comedy">Comedy</option>
        <option value="drama">Drama</option>
    </select>
</header>

<section class="movies" id="movieList">

    <div class="movie" data-genre="action">
        <h3>Avengers</h3>
        <p>Genre: Action</p>
        <p>Rating: <span class="rating">0</span></p>
        <button onclick="rateMovie(this, 1)">⭐</button>
        <button onclick="rateMovie(this, 2)">⭐⭐</button>
        <button onclick="rateMovie(this, 3)">⭐⭐⭐</button>
    </div>

    <div class="movie" data-genre="comedy">
        <h3>Mr. Bean</h3>
        <p>Genre: Comedy</p>
        <p>Rating: <span class="rating">0</span></p>
        <button onclick="rateMovie(this, 1)">⭐</button>
        <button onclick="rateMovie(this, 2)">⭐⭐</button>
        <button onclick="rateMovie(this, 3)">⭐⭐⭐</button>
    </div>

    <div class="movie" data-genre="drama">
        <h3>3 Idiots</h3>
        <p>Genre: Drama</p>
        <p>Rating: <span class="rating">0</span></p>
        <button onclick="rateMovie(this, 1)">⭐</button>
        <button onclick="rateMovie(this, 2)">⭐⭐</button>
        <button onclick="rateMovie(this, 3)">⭐⭐⭐</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
